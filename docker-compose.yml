services:
  db:
    image: postgres:16-alpine
    container_name: orderhub-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-orderhub}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-orderhub}
      POSTGRES_DB: ${POSTGRES_DB:-orderhub}
    ports:
      - "${DB_PORT:-5434}:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-orderhub}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile.dev
    container_name: orderhub-api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-orderhub}:${POSTGRES_PASSWORD:-orderhub}@db:5432/${POSTGRES_DB:-orderhub}?schema=public
      PORT: 3000
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:8080}
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:3000/api}
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL}
        VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY}
    container_name: orderhub-web
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - api

volumes:
  db_data:
